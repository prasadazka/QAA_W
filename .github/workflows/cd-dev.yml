name: CD - Deploy to Dev (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/cd-dev.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: qaaw-492106
  GCP_REGION: me-central1
  AR_REPOSITORY: qaa-docker
  SERVICE_NAME: qaa-backend-dev
  IMAGE_NAME: qaa-backend

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloud Run (Dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --port=8080
            --add-cloudsql-instances=qaaw-492106:me-central1:qaa-db-dev
            --set-env-vars=ENVIRONMENT=dev,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }},DB_HOST=34.18.37.125,DB_PORT=5432,DB_NAME=qaa_dev,DB_USER=postgres,CLOUD_SQL_INSTANCE=qaaw-492106:me-central1:qaa-db-dev,WHATSAPP_API_URL=https://waba-v2.360dialog.io,EMBEDDING_MODEL=text-embedding-004,EMBEDDING_DIMENSIONS=768,EMBEDDING_BATCH_SIZE=250,CHUNK_SIZE=500,CHUNK_MIN_LENGTH=20,CHUNK_MAX_KEYWORDS=8,SIMILARITY_THRESHOLD=0.35,SEARCH_RESULT_LIMIT=3,DEFAULT_CHANNEL=whatsapp_registration,LLM_MODEL=gemini-2.5-flash,LLM_REGION=us-central1,LLM_TEMPERATURE=0.3,LLM_MAX_TOKENS=512,LLM_API_TIMEOUT=15.0
            --set-secrets=DB_PASSWORD=qaa-db-password-dev:latest,WHATSAPP_API_KEY=qaa-whatsapp-api-key:latest

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed"
          exit 1
